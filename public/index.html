<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Share &amp; Paint</title>
  <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0010;
      --tb:      #0d001a;
      --border:  #2a0060;
      --active:  #8b52ff;
      --btn:     #150030;
      --btnhov:  #1f0048;
      --dim:     #c4a8ff;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--dim);
      font-family: system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%; height: 100%;
    }

    /* ── Toolbar ─────────────────────────────────────────────── */
    #toolbar {
      flex-shrink: 0;
      background: var(--tb);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .t-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
    }

    .sep {
      width: 1px; height: 32px;
      background: var(--border);
      flex-shrink: 0;
      margin: 0 2px;
    }

    /* generic button */
    .tbtn {
      width: 36px; height: 36px;
      border-radius: 7px;
      border: 1.5px solid transparent;
      background: var(--btn);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .12s, border-color .12s;
      padding: 0;
    }
    .tbtn:hover  { background: var(--btnhov); }
    .tbtn.active { border-color: var(--active); background: #1a0042; }

    /* ── Brush preview ── */
    #preview-wrap {
      width: 44px; height: 44px;
      border-radius: 8px;
      background: #080018;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #preview-dot {
      pointer-events: none;
      transition: width .1s, height .1s, border-radius .1s, background .1s;
    }

    /* ── Size slider ── */
    #slider-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #size-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 130px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    #size-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--active);
      border: 2px solid var(--dim);
      cursor: pointer;
    }
    #size-slider::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--active);
      border: 2px solid var(--dim);
      cursor: pointer;
    }

    /* shape icons */
    .si {
      width: 14px; height: 14px;
      background: var(--dim);
      display: block;
    }
    .si-round  { border-radius: 50%; }
    .si-square { border-radius: 2px; }

    /* user count + status group */
    #status-group { margin-left: auto; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    #user-count {
      font-size: 11px; font-weight: 700;
      color: var(--dim);
      min-width: 14px; text-align: right;
      letter-spacing: 0.04em;
    }
    #status-group svg { opacity: 0.7; flex-shrink: 0; }

    /* status dot */
    #status {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
      transition: background .3s;
    }
    #status.connected    { background: #22dd88; box-shadow: 0 0 6px #22dd88; }
    #status.disconnected { background: #dd2244; }
    #status.connecting   { background: #cc9922; }

    /* ── Palette row ── */
    .t-palette { padding: 0 14px 10px; }
    #palette-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 10px;
      border-radius: 5px;
      border: none;
      outline: none;
      cursor: pointer;
    }
    #palette-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2.5px solid #fff;
      background: var(--thumb-color, #8b52ff);
      box-shadow: 0 1px 5px rgba(0,0,0,0.6);
      cursor: pointer;
    }
    #palette-slider::-moz-range-thumb {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2.5px solid #fff;
      background: var(--thumb-color, #8b52ff);
      box-shadow: 0 1px 5px rgba(0,0,0,0.6);
      cursor: pointer;
    }

    /* ── Loading screen ── */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0;
      transition: opacity 0.7s ease;
      pointer-events: all;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    #loading-title {
      font-size: clamp(22px, 6vw, 42px);
      font-weight: 900;
      letter-spacing: 0.18em;
      color: var(--active);
      text-shadow: 0 0 40px rgba(139,82,255,0.5), 0 0 80px rgba(139,82,255,0.2);
    }
    #loading-sub {
      margin-top: 10px;
      font-size: clamp(10px, 2.5vw, 14px);
      font-weight: 600;
      letter-spacing: 0.28em;
      color: var(--dim);
    }
    #loading-dots {
      display: flex;
      gap: 7px;
      margin-top: 36px;
    }
    #loading-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--active);
      animation: ldot 1.3s ease-in-out infinite;
      opacity: 0.2;
    }
    #loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    #loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes ldot {
      0%, 80%, 100% { opacity: 0.2; transform: scale(1); }
      40% { opacity: 1; transform: scale(1.3); }
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1f0050;
      border: 1px solid var(--active);
      color: var(--dim);
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Canvas area ── */
    #canvas-wrap {
      flex: 1;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
    }
    #canvas {
      display: block;
      cursor: crosshair;
      touch-action: none;
      transform-origin: center center;
      will-change: transform;
      box-shadow:
        0 0 0 1px #1f0050,
        0 0 60px rgba(110, 47, 255, 0.2),
        0 20px 80px rgba(0, 0, 0, 0.6);
    }

    /* ── Zoom controls (floating bottom-right) ── */
    #zoom-controls {
      position: absolute;
      bottom: 14px;
      right: 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
    }
    .zbtn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: rgba(13,0,26,0.82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: var(--dim);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, border-color .12s;
      padding: 0;
      flex-shrink: 0;
    }
    .zbtn:hover  { background: rgba(31,0,72,0.9); border-color: var(--active); }
    .zbtn:active { background: #1a0042; }

    /* ── Brush type row ── */
    .brush-row { display: flex; gap: 6px; padding: 0 14px 7px; }
    .brush-btn {
      flex: 1; height: 30px;
      border-radius: 7px;
      border: 1.5px solid transparent;
      background: var(--btn);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, border-color .12s;
      padding: 0;
    }
    .brush-btn:hover  { background: var(--btnhov); }
    .brush-btn.active { border-color: var(--active); background: #1a0042; }

    /* ── Bottom-left buttons ── */
    #bottom-left-btns {
      position: absolute;
      bottom: 12px; left: 12px;
      z-index: 10;
      display: flex;
      flex-direction: row;
      gap: 6px;
      align-items: center;
    }
    #tickets-btn, #music-btn, #randomize-btn {
      background: rgba(13,0,26,0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1.5px solid var(--active);
      color: var(--active);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em;
      padding: 6px 10px;
      border-radius: 8px;
      white-space: nowrap;
      transition: background .12s, color .12s;
      cursor: pointer;
    }
    #tickets-btn {
      text-decoration: none;
    }
    #tickets-btn:hover, #music-btn:hover, #randomize-btn:hover { background: var(--active); color: #fff; }
    #music-btn.playing { background: var(--active); color: #fff; }
    #now-playing {
      font-size: 9px; font-weight: 600;
      color: var(--dim);
      max-width: 130px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      display: none;
      letter-spacing: 0.03em;
      opacity: 0.8;
    }

    /* RANDOMIZE: icon-only on small screens */
    .rnd-icon { display: none; }
    @media (max-width: 540px) {
      #randomize-btn {
        width: 36px; height: 36px;
        padding: 0;
        background: var(--btn);
        border-color: transparent;
        border-radius: 7px;
        display: flex; align-items: center; justify-content: center;
      }
      #randomize-btn:hover { background: var(--btnhov); border-color: transparent; color: var(--dim); }
      .rnd-label { display: none; }
      .rnd-icon  { display: block; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Toolbar ─────────────────────────────────────────────── -->
  <div id="toolbar">

    <!-- Row 1: tools -->
    <div class="t-row">

      <!-- Brush preview -->
      <div id="preview-wrap">
        <div id="preview-dot"></div>
      </div>

      <!-- Size slider -->
      <div id="slider-wrap">
        <input type="range" id="size-slider" min="30" max="150" value="40">
      </div>

      <div class="sep"></div>

      <!-- Eraser -->
      <button class="tbtn" id="eraser-btn" title="Eraser">
        <svg width="22" height="15" viewBox="0 0 22 15" fill="none">
          <rect x="1" y="1" width="20" height="13" rx="3" stroke="#c4a8ff" stroke-width="1.5"/>
          <rect x="13.5" y="1" width="7.5" height="13" rx="2" fill="#c4a8ff"/>
          <line x1="13.5" y1="1" x2="13.5" y2="14" stroke="#0d001a" stroke-width="1"/>
        </svg>
      </button>

      <div class="sep"></div>

      <!-- Reset canvas -->
      <button class="tbtn" id="reset-btn" title="Clear canvas">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M2.5 9a6.5 6.5 0 1 0 1.4-4" stroke="#c4a8ff" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M2.5 3.5v3.5H6" stroke="#c4a8ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <!-- Share link -->
      <button class="tbtn" id="share-btn" title="Copy share link">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 2v9" stroke="#c4a8ff" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M5.5 5.5L9 2l3.5 3.5" stroke="#c4a8ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 10v5h10v-5" stroke="#c4a8ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <!-- Randomize -->
      <button id="randomize-btn">
        <svg class="rnd-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M12 3h3v3" stroke="#c4a8ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M15 3l-5 5" stroke="#c4a8ff" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M6 15l-3-3 3-3" stroke="#c4a8ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 12h4" stroke="#c4a8ff" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M12 15h3v-3" stroke="#c4a8ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M15 15l-5-5" stroke="#c4a8ff" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="rnd-label">RANDOMIZE</span>
      </button>

      <!-- User count + status -->
      <div id="status-group">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" title="People painting">
          <circle cx="6.5" cy="4.5" r="2.5" fill="#c4a8ff"/>
          <path d="M1 12c0-3.038 2.462-5.5 5.5-5.5S12 8.962 12 12" stroke="#c4a8ff" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <span id="user-count" title="People painting">–</span>
        <div id="status" class="connecting" title="Connection"></div>
      </div>

    </div>

    <!-- Row 2: brush types -->
    <div class="brush-row">
      <!-- Round -->
      <button class="brush-btn active" data-brush="round" title="Round">
        <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5" fill="#c4a8ff"/></svg>
      </button>
      <!-- Soft / Airbrush -->
      <button class="brush-btn" data-brush="soft" title="Soft">
        <svg width="14" height="14" viewBox="0 0 14 14">
          <circle cx="7" cy="7" r="6" fill="#c4a8ff" opacity="0.25"/>
          <circle cx="7" cy="7" r="4" fill="#c4a8ff" opacity="0.45"/>
          <circle cx="7" cy="7" r="2" fill="#c4a8ff"/>
        </svg>
      </button>
      <!-- Rough -->
      <button class="brush-btn" data-brush="rough" title="Rough">
        <svg width="14" height="14" viewBox="0 0 14 14">
          <circle cx="4"  cy="5"  r="1.8" fill="#c4a8ff"/>
          <circle cx="9"  cy="4"  r="1.2" fill="#c4a8ff"/>
          <circle cx="7"  cy="9"  r="2.2" fill="#c4a8ff"/>
          <circle cx="12" cy="8"  r="1"   fill="#c4a8ff"/>
          <circle cx="3"  cy="11" r="1"   fill="#c4a8ff"/>
        </svg>
      </button>
      <!-- Spray -->
      <button class="brush-btn" data-brush="spray" title="Spray">
        <svg width="14" height="14" viewBox="0 0 14 14">
          <circle cx="7"  cy="7"  r="1"   fill="#c4a8ff"/>
          <circle cx="3"  cy="4"  r="0.8" fill="#c4a8ff" opacity="0.7"/>
          <circle cx="11" cy="4"  r="0.8" fill="#c4a8ff" opacity="0.6"/>
          <circle cx="2"  cy="9"  r="0.7" fill="#c4a8ff" opacity="0.5"/>
          <circle cx="12" cy="10" r="0.8" fill="#c4a8ff" opacity="0.7"/>
          <circle cx="6"  cy="12" r="0.7" fill="#c4a8ff" opacity="0.5"/>
          <circle cx="10" cy="2"  r="0.6" fill="#c4a8ff" opacity="0.4"/>
          <circle cx="4"  cy="12" r="0.6" fill="#c4a8ff" opacity="0.5"/>
        </svg>
      </button>
      <!-- Flat -->
      <button class="brush-btn" data-brush="flat" title="Flat">
        <svg width="14" height="14" viewBox="0 0 14 14">
          <rect x="1" y="5.5" width="12" height="3" rx="1.5" fill="#c4a8ff"/>
        </svg>
      </button>
    </div>

    <!-- Row 3: color palette slider -->
    <div class="t-row t-palette">
      <input type="range" id="palette-slider" min="0" max="19" value="8" step="1">
    </div>

  </div>

  <!-- ── Canvas ──────────────────────────────────────────────── -->
  <div id="canvas-wrap">
    <canvas id="canvas" width="2400" height="1600"></canvas>
    <div id="zoom-controls">
      <button class="zbtn" id="zoom-in-btn"  title="Zoom in">+</button>
      <button class="zbtn" id="zoom-out-btn" title="Zoom out">−</button>
    </div>
    <div id="bottom-left-btns">
      <a href="https://sortmyscene.com/event/pareidolia-mar-20-2026" target="_blank" rel="noopener" id="tickets-btn">PRDL005 TICKETS</a>
      <button id="music-btn">PLAY MUSIC</button>
      <span id="now-playing"></span>
    </div>
  </div>

</div>

<!-- Loading screen -->
<div id="loading-screen">
  <div id="loading-title">PAREIDOLIA 005</div>
  <div id="loading-sub">20.03 &nbsp;|&nbsp; EXT HYDERABAD</div>
  <div id="loading-dots"><span></span><span></span><span></span></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
'use strict';

// ── Config ────────────────────────────────────────────────────────
const CANVAS_BG  = '#0a0010';
const SIZE_MIN   = 30;
const SIZE_MAX   = 150;

const PALETTE = [
  '#ffffff',  // white
  '#f3eeff',  // whisper lavender
  '#e0d0ff',  // light lavender
  '#d9b3ff',  // soft lilac
  '#c4a8ff',  // medium light
  '#b890ff',  // periwinkle violet
  '#a87eff',  // soft violet
  '#9066ff',  // cornflower
  '#8b52ff',  // bright violet  ← default
  '#7840f5',  // electric violet
  '#6e2fff',  // vivid violet
  '#601ae0',  // deep violet
  '#5418e8',  // royal purple
  '#4808cc',  // strong purple
  '#3d0db5',  // indigo
  '#2e0898',  // deep indigo
  '#270880',  // dark violet
  '#1a0560',  // near-black violet
  '#120040',  // very dark
  '#08001e',  // midnight violet
];

// ── State ─────────────────────────────────────────────────────────
const tool = { color: '#8b52ff', size: 40, brush: 'round', eraser: false };

// ── DOM refs ──────────────────────────────────────────────────────
const canvas     = document.getElementById('canvas');
const ctx        = canvas.getContext('2d');
const previewDot = document.getElementById('preview-dot');
const statusEl   = document.getElementById('status');
const sizeSlider = document.getElementById('size-slider');
const toastEl    = document.getElementById('toast');

// ── Canvas init ───────────────────────────────────────────────────
function fillBg() {
  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
  ctx.fillStyle = CANVAS_BG;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
}
fillBg();

// ── Fit canvas to viewport ────────────────────────────────────────
const canvasWrap = document.getElementById('canvas-wrap');

let zoom   = 1;      // user zoom multiplier (1 = cover-fill)
let panX   = 0;      // CSS px offset from center
let panY   = 0;
let baseW  = 0;      // CSS px at zoom=1 (cover scale)
let baseH  = 0;

function applyTransform() {
  const W = canvasWrap.clientWidth;
  const H = canvasWrap.clientHeight;
  if (!W || !H) return;
  const visW = baseW * zoom;
  const visH = baseH * zoom;
  const maxPX = Math.max(0, (visW - W) / 2);
  const maxPY = Math.max(0, (visH - H) / 2);
  panX = Math.max(-maxPX, Math.min(maxPX, panX));
  panY = Math.max(-maxPY, Math.min(maxPY, panY));
  canvas.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
}

function fitCanvas() {
  const W = canvasWrap.clientWidth;
  const H = canvasWrap.clientHeight;
  if (!W || !H) return;
  const scale = Math.max(W / canvas.width, H / canvas.height);
  baseW = Math.floor(canvas.width  * scale);
  baseH = Math.floor(canvas.height * scale);
  canvas.style.width  = baseW + 'px';
  canvas.style.height = baseH + 'px';
  applyTransform();
}

function zoomAt(newZoom, cx, cy) {   // cx,cy in container-center coords
  const oldZ = zoom;
  zoom = Math.max(1, Math.min(1.4, newZoom));
  panX = cx * (1 - zoom / oldZ) + panX * (zoom / oldZ);
  panY = cy * (1 - zoom / oldZ) + panY * (zoom / oldZ);
  applyTransform();
}

// ResizeObserver fires after layout is computed — most reliable
new ResizeObserver(fitCanvas).observe(canvasWrap);

// ── Palette slider ────────────────────────────────────────────────
const paletteSlider = document.getElementById('palette-slider');
paletteSlider.style.background = `linear-gradient(to right, ${PALETTE.join(', ')})`;
paletteSlider.style.setProperty('--thumb-color', tool.color);

paletteSlider.addEventListener('input', () => {
  tool.color  = PALETTE[Number(paletteSlider.value)];
  tool.eraser = false;
  document.getElementById('eraser-btn').classList.remove('active');
  paletteSlider.style.setProperty('--thumb-color', tool.color);
  updatePreview();
});

// ── Size slider ───────────────────────────────────────────────────
sizeSlider.addEventListener('input', () => {
  tool.size = Number(sizeSlider.value);
  updateSliderFill();
  updatePreview();
});

function updateSliderFill() {
  const pct = ((tool.size - SIZE_MIN) / (SIZE_MAX - SIZE_MIN) * 100).toFixed(2);
  sizeSlider.style.background =
    `linear-gradient(to right, #8b52ff ${pct}%, #2a0060 ${pct}%)`;
}
updateSliderFill();

// ── Brush type buttons ────────────────────────────────────────────
document.querySelectorAll('.brush-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    tool.brush  = btn.dataset.brush;
    tool.eraser = false;
    document.getElementById('eraser-btn').classList.remove('active');
    document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updatePreview();
  });
});

// ── Eraser ────────────────────────────────────────────────────────
document.getElementById('eraser-btn').addEventListener('click', () => {
  tool.eraser = !tool.eraser;
  document.getElementById('eraser-btn').classList.toggle('active', tool.eraser);
  if (!tool.eraser) tool.color = PALETTE[Number(paletteSlider.value)];
  updatePreview();
});

// ── Reset canvas ──────────────────────────────────────────────────
document.getElementById('reset-btn').addEventListener('click', async () => {
  if (!confirm('Clear the canvas for everyone?')) return;
  // fillBg() fires when the Ably 'clear' event arrives for all clients
  await fetch('/api/reset', { method: 'POST' }).catch(() => {});
});

// ── Share link ────────────────────────────────────────────────────
document.getElementById('share-btn').addEventListener('click', async () => {
  const url = location.href;
  try {
    await navigator.clipboard.writeText(url);
    showToast('Link copied!');
  } catch (_) {
    prompt('Copy this link:', url);
  }
});

// ── Randomize brush ───────────────────────────────────────────────
document.getElementById('randomize-btn').addEventListener('click', () => {
  const brushes = ['round', 'soft', 'rough', 'spray', 'flat'];
  tool.brush  = brushes[Math.floor(Math.random() * brushes.length)];
  tool.color  = PALETTE[Math.floor(Math.random() * PALETTE.length)];
  tool.size   = Math.floor(Math.random() * (SIZE_MAX - SIZE_MIN) + SIZE_MIN);
  tool.eraser = false;

  sizeSlider.value = tool.size;
  updateSliderFill();

  const pi = PALETTE.indexOf(tool.color);
  paletteSlider.value = pi;
  paletteSlider.style.setProperty('--thumb-color', tool.color);

  document.querySelectorAll('.brush-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.brush === tool.brush)
  );
  document.getElementById('eraser-btn').classList.remove('active');
  updatePreview();
});

// ── Preview dot ───────────────────────────────────────────────────
function updatePreview() {
  const d = Math.min(tool.size, 34);
  const b = tool.brush;
  previewDot.style.width        = d + 'px';
  previewDot.style.height       = d + 'px';
  previewDot.style.borderRadius = (b === 'flat') ? '2px' : '50%';
  previewDot.style.background   = tool.eraser ? 'transparent' : tool.color;
  previewDot.style.border       = tool.eraser ? '2px dashed #8b52ff' : 'none';
  previewDot.style.opacity      = (b === 'soft' || b === 'spray') ? '0.55' : '1';
}
updatePreview();

// ── Deterministic hash (0–1) for consistent brush rendering across clients ──
function hash1(n) { const s = Math.sin(n * 127.1 + 311.7) * 43758.5453; return s - Math.floor(s); }

// ── Stroke rendering ──────────────────────────────────────────────
function renderStroke(s) {
  const brush = s.brush || s.shape || 'round';
  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
  ctx.fillStyle = ctx.strokeStyle = s.color;

  if (brush === 'soft') {
    const dx = s.x1-s.x0, dy = s.y1-s.y0;
    const len = Math.hypot(dx,dy) || 0.01;
    const steps = Math.ceil(len / Math.max(1, s.size * 0.12));
    ctx.globalAlpha = 0.06;
    for (let i = 0; i <= steps; i++) {
      const t = i/steps;
      ctx.beginPath(); ctx.arc(s.x0+dx*t, s.y0+dy*t, s.size, 0, Math.PI*2); ctx.fill();
    }
  } else if (brush === 'rough') {
    const dx = s.x1-s.x0, dy = s.y1-s.y0;
    const len = Math.hypot(dx,dy) || 0.01;
    const steps = Math.ceil(len / 1.5);
    const r = s.size / 2;
    for (let i = 0; i <= steps; i++) {
      const t = i/steps, seed = i*3.7 + s.x0*0.13 + s.y0*0.07;
      const x = s.x0+dx*t + (hash1(seed)-0.5)*r*1.4;
      const y = s.y0+dy*t + (hash1(seed+0.5)-0.5)*r*1.4;
      ctx.beginPath(); ctx.arc(x, y, r*0.28*(0.5+hash1(seed+1)), 0, Math.PI*2); ctx.fill();
    }
  } else if (brush === 'spray') {
    const dx = s.x1-s.x0, dy = s.y1-s.y0;
    const len = Math.hypot(dx,dy) || 0.01;
    const steps = Math.ceil(len / 4);
    const dots = Math.max(4, Math.floor(s.size * 0.6));
    for (let i = 0; i <= steps; i++) {
      const t = i/steps, cx = s.x0+dx*t, cy = s.y0+dy*t;
      for (let j = 0; j < dots; j++) {
        const seed = i*97+j + Math.round(s.x0)*3 + Math.round(s.y0)*7;
        const a = hash1(seed)*Math.PI*2, r = hash1(seed+0.5)*s.size;
        ctx.beginPath(); ctx.arc(cx+Math.cos(a)*r, cy+Math.sin(a)*r, 1, 0, Math.PI*2); ctx.fill();
      }
    }
  } else if (brush === 'flat') {
    const dx = s.x1-s.x0, dy = s.y1-s.y0;
    const len = Math.hypot(dx,dy) || 0.01;
    const angle = Math.atan2(dy,dx);
    const w = s.size*2.5, h = Math.max(2, s.size*0.35);
    const steps = Math.ceil(len / Math.max(1, h*0.8));
    for (let i = 0; i <= steps; i++) {
      const t = i/steps;
      ctx.save(); ctx.translate(s.x0+dx*t, s.y0+dy*t); ctx.rotate(angle);
      ctx.fillRect(-w/2, -h/2, w, h); ctx.restore();
    }
  } else {
    // round (default) or square
    ctx.lineWidth = s.size;
    ctx.lineCap   = brush === 'square' ? 'square' : 'round';
    ctx.lineJoin  = brush === 'square' ? 'miter'  : 'round';
    ctx.beginPath();
    ctx.moveTo(s.x0, s.y0);
    ctx.lineTo((s.x0===s.x1 && s.y0===s.y1) ? s.x1+0.01 : s.x1, s.y1);
    ctx.stroke();
  }
  ctx.restore();
}

function effectiveProps() {
  if (tool.eraser) return { color: CANVAS_BG, size: tool.size, brush: 'round', shape: 'round' };
  return { color: tool.color, size: tool.size, brush: tool.brush, shape: tool.brush };
}

// ── Pointer input ─────────────────────────────────────────────────
let drawing = false, lastX = 0, lastY = 0;

// pt = anything with .clientX / .clientY (MouseEvent, Touch, or plain object)
function canvasXY(pt) {
  const r  = canvas.getBoundingClientRect();
  const sx = canvas.width  / r.width;
  const sy = canvas.height / r.height;
  return [(pt.clientX - r.left) * sx, (pt.clientY - r.top) * sy];
}

function startDraw(pt) {
  drawing = true;
  [lastX, lastY] = canvasXY(pt);
  const props  = effectiveProps();
  const stroke = { x0: lastX, y0: lastY, x1: lastX, y1: lastY, ...props };
  renderStroke(stroke);
  sendMsg({ type: 'stroke', stroke });
}

function moveDraw(pt) {
  if (!drawing) return;
  const [x, y] = canvasXY(pt);
  const props  = effectiveProps();
  const stroke = { x0: lastX, y0: lastY, x1: x, y1: y, ...props };
  renderStroke(stroke);
  sendMsg({ type: 'stroke', stroke });
  [lastX, lastY] = [x, y];
}

function stopDraw() { drawing = false; }

// ── Mouse ──────────────────────────────────────────────────────────
canvas.addEventListener('mousedown',  e => { e.preventDefault(); startDraw(e); });
canvas.addEventListener('mousemove',  e => { e.preventDefault(); moveDraw(e);  });
canvas.addEventListener('mouseup',    stopDraw);
canvas.addEventListener('mouseleave', stopDraw);

// ── Touch (draw + pinch-zoom) ──────────────────────────────────────
let pinching = false, lastPinchDist = 0, lastMidCX = 0, lastMidCY = 0;

function touchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function touchMidContainer(touches) {
  const wr = canvasWrap.getBoundingClientRect();
  return {
    x: (touches[0].clientX + touches[1].clientX) / 2 - wr.left - wr.width  / 2,
    y: (touches[0].clientY + touches[1].clientY) / 2 - wr.top  - wr.height / 2,
  };
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (e.touches.length >= 2) {
    drawing  = false;
    pinching = true;
    lastPinchDist = touchDist(e.touches);
    const m = touchMidContainer(e.touches);
    lastMidCX = m.x; lastMidCY = m.y;
  } else if (!pinching) {
    startDraw(e.touches[0]);
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length >= 2) {
    pinching = true; drawing = false;
    const dist = touchDist(e.touches);
    const m    = touchMidContainer(e.touches);
    // Pan: move by mid-point translation
    panX += m.x - lastMidCX;
    panY += m.y - lastMidCY;
    // Zoom toward pinch mid
    if (dist > 0 && lastPinchDist > 0) {
      const oldZ = zoom;
      zoom = Math.max(1, Math.min(1.4, zoom * dist / lastPinchDist));
      panX = m.x * (1 - zoom / oldZ) + panX * (zoom / oldZ);
      panY = m.y * (1 - zoom / oldZ) + panY * (zoom / oldZ);
    }
    lastPinchDist = dist; lastMidCX = m.x; lastMidCY = m.y;
    applyTransform();
  } else if (drawing) {
    moveDraw(e.touches[0]);
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  if (e.touches.length < 2) pinching = false;
  if (e.touches.length === 0) drawing = false;
});

// ── Zoom buttons ──────────────────────────────────────────────────
document.getElementById('zoom-in-btn').addEventListener('click', () => {
  zoomAt(zoom * 1.3, 0, 0);
});
document.getElementById('zoom-out-btn').addEventListener('click', () => {
  zoomAt(zoom / 1.3, 0, 0);
});

// ── Realtime: Ably + fetch ────────────────────────────────────────
// Strokes are published via Ably (low-latency) and batch-saved to
// Vercel KV every 500 ms so new clients can replay history.

let ablyChannel = null;
let pending     = [];
let saveTimer   = null;

async function initRealtime() {
  setStatus('connecting');

  // 1. Load persisted strokes from KV
  try {
    const { strokes } = await fetch('/api/strokes').then(r => r.json());
    fillBg();
    strokes.forEach(renderStroke);
  } catch (e) {
    console.error('[init] failed to load strokes:', e);
  }

  // 2. Connect to Ably (token fetched from /api/token)
  const ably = new Ably.Realtime({ authUrl: '/api/token' });
  ablyChannel = ably.channels.get('canvas');

  ably.connection.on('connected', async () => {
    setStatus('connected');
    try {
      await ablyChannel.presence.enter();
      refreshCount();
    } catch (_) {}
  });
  ably.connection.on('disconnected', () => setStatus('disconnected'));
  ably.connection.on('suspended',    () => setStatus('disconnected'));
  ably.connection.on('failed',       () => setStatus('disconnected'));

  ablyChannel.subscribe('stroke', msg => renderStroke(msg.data));
  ablyChannel.subscribe('clear',  ()  => fillBg());
  ablyChannel.presence.subscribe(() => refreshCount());
}

async function refreshCount() {
  try {
    const members = await ablyChannel.presence.get();
    document.getElementById('user-count').textContent = members.length;
  } catch (_) {}
}

// Called by drawing code — publish immediately, batch-save to KV
function sendMsg(obj) {
  if (obj.type !== 'stroke') return;
  if (ablyChannel) ablyChannel.publish('stroke', obj.stroke);
  pending.push(obj.stroke);
  if (!saveTimer) saveTimer = setTimeout(flushStrokes, 500);
}

async function flushStrokes() {
  saveTimer = null;
  if (!pending.length) return;
  const batch = pending.splice(0);
  try {
    await fetch('/api/strokes', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ strokes: batch }),
    });
  } catch (_) {
    pending.unshift(...batch); // retry next tick
  }
}

function setStatus(s) { statusEl.className = s; }

initRealtime();

// ── Music (YouTube IFrame API) ────────────────────────────────────
(function() {
  const musicBtn  = document.getElementById('music-btn');
  const nowPlayEl = document.getElementById('now-playing');
  let player      = null;
  let playerReady = false;
  let state       = 'idle';   // idle | playing | paused
  let didInitSeek = false;

  // Hidden container for YT player
  const ytHost = document.createElement('div');
  ytHost.id = 'yt-host';
  ytHost.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;';
  document.body.appendChild(ytHost);

  // Load API eagerly so player is ready before user clicks (preserves user gesture chain)
  const ytScript = document.createElement('script');
  ytScript.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(ytScript);

  function dismissLoader() {
    const ls = document.getElementById('loading-screen');
    if (!ls) return;
    ls.classList.add('fade-out');
    setTimeout(() => { if (ls.parentNode) ls.remove(); }, 700);
  }
  // Fallback: dismiss after 8s if API never fires
  setTimeout(dismissLoader, 8000);

  window.onYouTubeIframeAPIReady = function() {
    player = new YT.Player('yt-host', {
      videoId: 'mBuadFbRfi4',
      playerVars: {
        list: 'RDmBuadFbRfi4', listType: 'playlist',
        autoplay: 0, controls: 0, playsinline: 1,
      },
      events: {
        onReady: function() { playerReady = true; dismissLoader(); },
        onStateChange: function(e) {
          if (e.data === YT.PlayerState.PLAYING) {
            state = 'playing';
            updateBtn();
            // On first play: seek to random 0–70% of duration
            if (!didInitSeek) {
              didInitSeek = true;
              const dur = player.getDuration();
              if (dur > 10) player.seekTo(Math.floor(Math.random() * dur * 0.7), true);
            }
            tryUpdateTitle();
          } else if (e.data === YT.PlayerState.PAUSED) {
            state = 'paused';
            updateBtn();
          }
        },
      },
    });
  };

  // Retry until video metadata is available
  function tryUpdateTitle() {
    const title = (player.getVideoData() || {}).title || '';
    if (title) {
      nowPlayEl.textContent = '♪ ' + title;
      nowPlayEl.style.display = 'block';
    } else {
      setTimeout(tryUpdateTitle, 400);
    }
  }

  function updateBtn() {
    const labels = { idle: 'PLAY MUSIC', playing: 'PAUSE MUSIC', paused: 'RESUME MUSIC' };
    musicBtn.textContent = labels[state] || 'PLAY MUSIC';
    musicBtn.classList.toggle('playing', state === 'playing');
  }

  musicBtn.addEventListener('click', () => {
    if      (state === 'idle'   && playerReady) { player.playVideo();  }
    else if (state === 'playing')               { player.pauseVideo(); }
    else if (state === 'paused')                { player.playVideo();  }
  });
})();

// ── Toast ─────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
}
</script>
